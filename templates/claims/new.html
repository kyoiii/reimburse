{% extends "base.html" %}

{% block title %}New Claim{% endblock %}

{% block content %}

<div class="max-w-xl mx-auto">

  <!-- Back link -->
  <div class="mb-6">
    <a href="{{ url_for('dashboard') }}"
       class="inline-flex items-center gap-1.5 text-sm font-medium text-gray-500 hover:text-indigo-600 transition-colors">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
      </svg>
      Back to Dashboard
    </a>
  </div>

  <!-- Header -->
  <div class="mb-8">
    <h1 class="text-2xl font-bold text-gray-900">New Claim</h1>
    <p class="mt-1 text-sm text-gray-500">Create a new claim period to start logging travel and purchases.</p>
  </div>

  <!-- Card -->
  <div class="bg-white rounded-xl border border-gray-200 shadow-sm p-6">

    <form method="POST" action="{{ url_for('claims_new') }}" class="space-y-5">

      <!-- Period Name -->
      <div>
        <label for="period_name" class="block text-sm font-medium text-gray-700 mb-1.5">
          Period Name <span class="text-red-500">*</span>
        </label>
        <input
          type="text"
          id="period_name"
          name="period_name"
          required
          placeholder="e.g. July 2025 Expenses or Q3 Travel Claims"
          class="w-full px-3.5 py-2.5 border border-gray-300 rounded-lg text-sm text-gray-900 placeholder-gray-400
                 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition"
        />
        <p class="mt-1 text-xs text-gray-400">Give this claim period a descriptive name.</p>
      </div>

      <!-- Notes -->
      <div>
        <label for="notes" class="block text-sm font-medium text-gray-700 mb-1.5">
          Notes <span class="text-gray-400 font-normal">(optional)</span>
        </label>
        <textarea
          id="notes"
          name="notes"
          rows="3"
          placeholder="Any additional notes about this claim period..."
          class="w-full px-3.5 py-2.5 border border-gray-300 rounded-lg text-sm text-gray-900 placeholder-gray-400
                 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition resize-y"
        ></textarea>
      </div>

      <!-- Actions -->
      <div class="flex items-center gap-3 pt-2">
        <button type="submit"
          class="inline-flex items-center gap-2 px-5 py-2.5 rounded-lg text-sm font-semibold bg-indigo-600 text-white hover:bg-indigo-700 transition-colors shadow-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:ring-offset-2">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
          </svg>
          Create claim
        </button>
        <a href="{{ url_for('dashboard') }}"
          class="px-5 py-2.5 rounded-lg text-sm font-medium text-gray-600 hover:text-gray-900 hover:bg-gray-100 transition-colors">
          Cancel
        </a>
      </div>

    </form>
  </div>

</div>

{% endblock %}
