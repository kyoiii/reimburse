{% extends "base.html" %}
{% block title %}New Claim{% endblock %}

{% block content %}
<div class="max-w-xl mx-auto">

  <div class="flex items-center gap-3 mb-6">
    <a href="{{ url_for('dashboard') }}" class="text-gray-400 hover:text-indigo-600 transition-colors">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
      </svg>
    </a>
    <h1 class="text-xl font-bold text-gray-900">New Claim</h1>
  </div>

  <div class="bg-white rounded-xl border border-gray-200 shadow-sm p-6">
    <form method="POST" action="{{ url_for('claims_new') }}" class="space-y-5">

      <div>
        <label for="period_name" class="block text-sm font-medium text-gray-700 mb-1">Period Name <span class="text-red-500">*</span></label>
        <input type="text" id="period_name" name="period_name" required
          placeholder="e.g. July 2026 Expenses"
          class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm text-gray-900 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition" />
      </div>

      <div>
        <label for="notes" class="block text-sm font-medium text-gray-700 mb-1">Notes <span class="text-gray-400 font-normal">(optional)</span></label>
        <textarea id="notes" name="notes" rows="3"
          placeholder="Any notes about this claim period..."
          class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm text-gray-900 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition resize-y"></textarea>
      </div>

      <div class="flex items-center gap-3 pt-1">
        <button type="submit"
          class="px-5 py-2.5 rounded-lg bg-indigo-600 text-white text-sm font-semibold hover:bg-indigo-700 transition-colors focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:ring-offset-2">
          Create
        </button>
        <a href="{{ url_for('dashboard') }}" class="px-5 py-2.5 rounded-lg text-sm font-medium text-gray-600 hover:bg-gray-100 transition-colors">Cancel</a>
      </div>

    </form>
  </div>

</div>
{% endblock %}
