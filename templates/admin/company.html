{% extends "base.html" %}
{% block title %}Company Settings{% endblock %}

{% block content %}
<div class="mb-6">
  <h1 class="text-xl font-bold text-gray-900">Company Settings</h1>
</div>

<div class="max-w-lg">
  <div class="bg-white rounded-xl border border-gray-200 shadow-sm p-6">
    <form method="POST" action="{{ url_for('admin_company') }}" class="space-y-5">

      <div>
        <label for="company_name" class="block text-sm font-medium text-gray-700 mb-1">Company Name</label>
        <input type="text" id="company_name" name="company_name" value="{{ company.name }}" required
          class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm text-gray-900 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition" />
      </div>

      <div>
        <label for="mileage_rate" class="block text-sm font-medium text-gray-700 mb-1">Mileage Rate ($/km)</label>
        <div class="relative">
          <span class="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 text-sm">$</span>
          <input type="number" id="mileage_rate" name="mileage_rate" value="{{ company.mileage_rate }}" step="0.01" min="0" required
            class="w-full pl-7 pr-3 py-2 border border-gray-300 rounded-lg text-sm text-gray-900 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition" />
        </div>
      </div>

      <button type="submit"
        class="px-5 py-2.5 rounded-lg bg-indigo-600 text-white text-sm font-semibold hover:bg-indigo-700 transition-colors focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:ring-offset-2">
        Save
      </button>

    </form>
  </div>
</div>
{% endblock %}
