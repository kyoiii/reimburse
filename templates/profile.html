{% extends "base.html" %}
{% block title %}My Profile{% endblock %}

{% block content %}
<div class="mb-6">
  <h1 class="text-xl font-bold text-gray-900">My Profile</h1>
</div>

<div class="grid grid-cols-1 lg:grid-cols-2 gap-6">

  <div class="bg-white rounded-xl border border-gray-200 shadow-sm p-6">
    <h2 class="text-sm font-semibold text-gray-800 mb-4">Profile Details</h2>
    <form method="POST" action="{{ url_for('profile') }}" class="space-y-4">
      <input type="hidden" name="action" value="profile" />

      <div>
        <label for="full_name" class="block text-sm font-medium text-gray-700 mb-1">Full Name</label>
        <input type="text" id="full_name" name="full_name" value="{{ current_user.full_name or '' }}" placeholder="Your full name"
          class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm text-gray-900 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition" />
      </div>

      <div>
        <label for="email" class="block text-sm font-medium text-gray-700 mb-1">Email</label>
        <input type="email" id="email" name="email" value="{{ current_user.email or '' }}" placeholder="you@example.com"
          class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm text-gray-900 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition" />
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Username</label>
        <div class="px-3 py-2 border border-gray-200 rounded-lg text-sm text-gray-500 bg-gray-50">{{ current_user.username }}</div>
      </div>

      <button type="submit"
        class="px-5 py-2.5 rounded-lg bg-indigo-600 text-white text-sm font-semibold hover:bg-indigo-700 transition-colors focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:ring-offset-2">
        Save changes
      </button>
    </form>
  </div>

  <div class="bg-white rounded-xl border border-gray-200 shadow-sm p-6">
    <h2 class="text-sm font-semibold text-gray-800 mb-4">Change Password</h2>
    <form method="POST" action="{{ url_for('profile') }}" class="space-y-4">
      <input type="hidden" name="action" value="password" />

      <div>
        <label for="current_password" class="block text-sm font-medium text-gray-700 mb-1">Current Password</label>
        <input type="password" id="current_password" name="current_password" autocomplete="current-password"
          class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm text-gray-900 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition" />
      </div>

      <div>
        <label for="new_password" class="block text-sm font-medium text-gray-700 mb-1">New Password</label>
        <input type="password" id="new_password" name="new_password" autocomplete="new-password"
          class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm text-gray-900 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition" />
      </div>

      <div>
        <label for="confirm_new_password" class="block text-sm font-medium text-gray-700 mb-1">Confirm New Password</label>
        <input type="password" id="confirm_new_password" name="confirm_new_password" autocomplete="new-password"
          class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm text-gray-900 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition" />
      </div>

      <button type="submit"
        class="px-5 py-2.5 rounded-lg bg-indigo-600 text-white text-sm font-semibold hover:bg-indigo-700 transition-colors focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:ring-offset-2">
        Update password
      </button>
    </form>
  </div>

</div>
{% endblock %}
